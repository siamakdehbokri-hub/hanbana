services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: habana
      POSTGRES_PASSWORD: habana
      POSTGRES_DB: habana
    ports:
      - "5432:5432"
    volumes:
      - habana-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ..
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - ../.env.example
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

volumes:
  habana-postgres:
